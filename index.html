<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LGW 减脂看板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #FF7F00 0%, #0066CC 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        h1 { text-align: center; color: #fff; margin-bottom: 30px; font-size: 28px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .stats { display: flex; justify-content: space-around; flex-wrap: wrap; }
        .stat-item { text-align: center; margin: 10px; }
        .stat-value { font-size: 26px; font-weight: bold; color: #FF6600; }
        .stat-label { font-size: 14px; color: #666; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #eee; }
        th { color: #666; font-weight: normal; }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px 0 20px;
            color: rgba(255,255,255,0.9);
        }
        .footer .brand-line {
            font-size: 14px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 6px;
        }
        .footer .thank-line {
            font-size: 14px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 12px;
        }
        .footer .motto-line {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        .footer img {
            width: 40%;
            max-width: 588px;
            height: auto;
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦞 LGW 减脂看板</h1>
        
        <div class="card">
            <h2>📊 当前状态</h2>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value">95.1</div>
                    <div class="stat-label">当前体重 (kg)</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">75.0</div>
                    <div class="stat-label">目标体重 (kg)</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">20.1</div>
                    <div class="stat-label">待减重 (kg)</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">29.9</div>
                    <div class="stat-label">BMI</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>📈 体重趋势</h2>
            <canvas id="weightChart"></canvas>
        </div>
        
        <div class="card">
            <h2>🍽️ 今日饮食</h2>
            <table>
                <tr><th>餐次</th><th>内容</th><th>热量</th><th>蛋白</th><th>碳水</th><th>脂肪</th></tr>
                <tr><td>午餐</td><td>鸡腿、紫米饭、炒白菜</td><td>~490</td><td>41g</td><td>46g</td><td>16g</td></tr>
            </table>
            <p style="margin-top:15px; font-size:14px; color:#666;">📅 最后更新：2026-05-25</p>
        </div>

        <div class="card">
            <h2>💊 补剂记录</h2>
            <p>纽崔莱植物蛋白粉 · 沛源蛋白粉 · 倍立健</p>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="brand-line">虾教练·为LGW定制</div>
            <div class="thank-line">感谢Xiaohan一直以来的支持与鼓励</div>
            <div class="motto-line">让我们遇见更好的自己，帮人们过上更好的生活</div>
            <img src="nglogo.png" alt="NG Logo">
        </div>
    </div>

    <script>
        const ctx = document.getElementById('weightChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['05-25'],
                datasets: [{
                    label: '体重 (kg)',
                    data: [95.1],
                    borderColor: '#FF6600',
                    backgroundColor: 'rgba(255, 102, 0, 0.1)',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: false,
                        suggestedMin: 70,
                        suggestedMax: 100
                    }
                }
            }
        });
    </script>
</body>
</html>
